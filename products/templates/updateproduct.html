{% extends 'base.html' %}
{% load static %}

{% block title %}
Update_Product
{% endblock title %}


{% block content %}
<div class="container-fluid mt-3">
    <div class="row justify-content-center">
        <div class="col-5 border rounded p-3 shodew p-4">
            <h3 class="bg-info text-center py-3 rounded-2 fw-bold">Update Products</h3>
            <form action="" method="post">
                {% csrf_token %}
                <div class="mt-3">
                    <label for="name" class="form-label">Product Name *</label>
                    <input type="text" name="name" id="name" value="{{product.name}}" class="form-control" placeholder="Product Name">
                </div>
                <div class="mt-3">
                    <label for="price"  class="form-label">Price *</label>
                    <input type="number" min="0" name="price" value="{{product.price}}" id="price" class="form-control" placeholder="Price">
                </div>
          <div class="mb-3">
                <label for="categorySelect" class="form-label">- Select Category -
                </label>
                <select class="form-select" name="category" id="categorySelect">
                    <option value="" selected disabled>Choose one...</option>
                    
                    <option value="Electronics"{% if  product.category == 'Electronics' %} selected  {% endif %}>Electronics</option>
                   
                  
                    <option value="Fashion"  {% if product.category == 'Fashion' %} selected  {% endif %}>Fashion</option>
                   
                  
                        <option value="Shoes"{% if product.category == 'Shoes' %} selected  {% endif %}>Shoes</option>
                
                    <option value="Home" {% if product.category == 'Home' %}selected     {% endif %}>Home</option>
                
                </select>
                </div>
                <div>
                    <label for="stock" class="form-label">Stock Quantity *</label>
                    <input type="number" min="0" value="{{product.stock}}" name="stock" id="" class="form-control" placeholder="Stock Quantity">
                </div>
                <button type="submit" class=" mt-3 btn btn-success fw-bold">Update Product</button>

            </form>
        </div>
    </div>
</div>
{% endblock content %}
